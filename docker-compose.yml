version: '3.8'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: spotlightlover_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spotlightlover
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend NestJS ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: builder
    container_name: spotlightlover_backend
    command: npm run start:dev
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/spotlightlover
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: dev-secret-change-in-prod-64chars
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-prod-64chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      MESOMB_APP_KEY: ${MESOMB_APP_KEY:-}
      MESOMB_APP_SECRET: ${MESOMB_APP_SECRET:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CANDIDATE_REGISTRATION_FEE: 500
      VOTE_AMOUNT: 100
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend React ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: builder
    container_name: spotlightlover_frontend
    command: npm run dev -- --host
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
