version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: spotlight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spotlight
      POSTGRES_PASSWORD: spotlight_password
      POSTGRES_DB: spotlight_lover
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spotlight']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spotlight-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://spotlight:spotlight_password@postgres:5432/spotlight_lover?schema=public
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
    env_file:
      - ./backend/.env
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spotlight-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: http://localhost:3000
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
